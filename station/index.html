<style>

  .pane{position:absolute;border:1px solid #0d1117}

     two-thirds full-height, level plan a small window floated over the FPS
     top-right corner. (mobile overrides further down.) */
  body:not(.mobile) #buildings{top:0;left:0;width:33.33%;height:50%}
  body:not(.mobile) #stack    {bottom:0;left:0;width:33.33%;height:50%}
  body:not(.mobile) #fps      {top:0;right:0;width:66.67%;height:100%}
  body:not(.mobile) #plan     {top:10px;right:10px;width:23%;height:31%;z-index:5;border:2px solid rgba(255,255,255,.5);border-radius:10px;overflow:hidden}
  body:not(.mobile) #cross{left:66.6%;top:50%}
  body:not(.mobile) #stackinfo{left:8px;top:calc(50% + 28px)}
  body:not(.mobile) #hud{left:34%}
  body:not(.mobile) #look{left:34%}
  body:not(.mobile) #selinfo{left:34%;top:8px;max-width:30%}
  .tag{position:absolute;z-index:6;color:#fff;font:600 11px system-ui;text-shadow:0 1px 3px #000;pointer-events:none;top:6px}
  #cross{position:absolute;left:50%;top:75%;width:16px;height:16px;transform:translate(-50%,-50%);z-index:6;pointer-events:none;opacity:.85}
  #cross::before,#cross::after{content:"";position:absolute;background:#fff;box-shadow:0 0 2px #000}

  .panel{position:absolute;z-index:7;color:#c9d1d9;font-size:11px;background:rgba(13,17,23,.82);padding:7px 9px;border-radius:7px;line-height:1.45}
  .panel b{color:#fff}
  #info{left:8px;top:28px;max-width:30%;pointer-events:none}
  #stackinfo{left:34%;top:28px;max-width:29%;pointer-events:none}
  #look{left:8px;bottom:54px;max-width:60%;display:none}
  #hud{left:10px;bottom:30px;max-width:62%;font-size:12px}
  #planinfo{right:12px;bottom:34px;max-width:23%;display:none;pointer-events:none}
  #selinfo{left:8px;top:8px;max-width:46%;display:none;border-left:3px solid #ffd23f}

  body.mobile #cross{top:50%}
  body.mobile .tag{display:none}
  body.mobile #info,body.mobile #stackinfo{max-width:78%}

<body>

  <div id="cross"></div>

  <div class="attrib">© <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors · <a href="https://indoorequal.org" target="_blank" rel="noopener">indoorequal</a></div>
  <div id="loading">loading Gare de Lyon…</div>

<script>
/* ============================================================================
 * OpenIndoor · Station — Gare de Lyon, on MapLibre GL JS. Four linked maps:
 *   #buildings (TL) all 3D shells; hover pre-selects, click selects.
 *   #stack     (TM) the selected building's levels, exploded & colour-coded;
 *                   click one to focus. Rotation only (no pan), auto-fit.
 *   #plan      (TR) the focused level, 2D, heading-up, whole floor; click a
 *                   feature (shop / stairs / elevator / door…) for info.
 *   #fps       (B)  first-person walk, confined to the walkable indoor area;
 *                   the component under the crosshair is highlighted + described.
 * Desktop shows all four; mobile steps through buildings → levels → FPS.
 * Data © OpenStreetMap contributors (ODbL). See data/fetch*.sh.
 * ==========================================================================*/

const CENTER=[2.374633,48.844533], LAT0=CENTER[1], COSLAT=Math.cos(LAT0*Math.PI/180);
const M_LAT=111320, M_LON=111320*COSLAT, EARTH=40075016.686, WALL_H=3;
// MapLibre's fill-extrusion shader clamps base/height to >=0, so we can't extrude
// below ground. Lift the whole FPS scene onto a slab at BASE_Z metres → down
// escalators / basements descend into positive-z space below it instead of being clamped.
const BASE_Z=10;
const FPS_ESC_ONLY=true;   // DEBUG: hide floor/walls/POIs in FPS, show only escalators
const GAP=5, SLAB=0.6, FLOORISH=['room','area','corridor','yes','level'];
const parseLevels=v=>{ if(v==null) return []; const o=[]; for(const p of String(v).split(';')){const n=parseFloat(p); if(!isNaN(n)) o.push(n);} return o; };

let INDOOR={type:'FeatureCollection',features:[]}, BUILDINGS={type:'FeatureCollection',features:[]};
let SEL=[], SEL_LEVELS=[0], minLv=0, activeLevel=0, selGroup=null, hoverGroup=null, PICK=null, HOVER=null, GROUP={}, MEMBERS={};
let selInfo='hover a building', selName='Gare de Lyon', mePlan, planZoom=18, planZoomAdj=0, turnTo=null, WALK=[];
const player={lng:CENTER[0],lat:CENTER[1],heading:0,pitch:90,z:0};   // pitch 85–95: look down/up; z: rise while on an escalator
let ESC=[], ride=null, rideCool=0, aPhase=0;   // escalator zones / active ride / re-board cooldown / running-band phase
const compass=()=>Math.atan2(Math.cos(player.heading),Math.sin(player.heading))*180/Math.PI;
// mobile = coarse pointer OR a narrow window — so a desktop window shrunk below
// 820px switches to the stepped single-view layout (lets you simulate mobile).
const isMobile=()=>matchMedia('(pointer:coarse)').matches||innerWidth<=820;
let MOBILE=isMobile();
document.body.classList.toggle('mobile',MOBILE);
let step='buildings';

const levelFC=lv=>({type:'FeatureCollection',features:SEL.filter(f=>{const l=parseLevels(f.properties.level); return l.length&&l.includes(lv);})});
const floorsOf=arr=>arr.filter(f=>FLOORISH.includes(f.properties.indoor)&&f.geometry&&(f.geometry.type==='Polygon'||f.geometry.type==='MultiPolygon'));
function centroid(features){ let sx=0,sy=0,n=0; const w=c=>{ if(typeof c[0]==='number'){sx+=c[0];sy+=c[1];n++;} else c.forEach(w); }; for(const f of features) if(f.geometry) w(f.geometry.coordinates); return n?[sx/n,sy/n]:CENTER; }
const repPoint=g=>{ let c=g&&g.coordinates; while(c&&typeof c[0]!=='number') c=c[0]; return c; };
function bboxOf(g){ const a=[180,90,-180,-90]; const w=c=>{ if(typeof c[0]==='number'){a[0]=Math.min(a[0],c[0]);a[1]=Math.min(a[1],c[1]);a[2]=Math.max(a[2],c[0]);a[3]=Math.max(a[3],c[1]);} else c.forEach(w); }; w(g.coordinates); return a; }
const inBbox=(p,b)=>p&&p[0]>=b[0]&&p[0]<=b[2]&&p[1]>=b[1]&&p[1]<=b[3];
function fitView(features,m,pad,wide){ pad=pad||1.2; const bb=[180,90,-180,-90];
  for(const f of features) if(f.geometry){const b=bboxOf(f.geometry); bb[0]=Math.min(bb[0],b[0]);bb[1]=Math.min(bb[1],b[1]);bb[2]=Math.max(bb[2],b[2]);bb[3]=Math.max(bb[3],b[3]);}
  if(bb[2]<bb[0]) return {center:CENTER,zoom:16};
  const center=[(bb[0]+bb[2])/2,(bb[1]+bb[3])/2], ext=Math.max((bb[2]-bb[0])*M_LON,(bb[3]-bb[1])*M_LAT,20);
  const cv=m.getCanvas(), px=wide?(cv.clientWidth||300):Math.min(cv.clientWidth||300,cv.clientHeight||300);
  return {center, zoom:Math.log2(EARTH*COSLAT/(512*(ext*pad/px)))}; }
/* walkable area (floor polygons) for FPS containment */
function walkRings(features){ const r=[]; for(const f of features){ if(!FLOORISH.includes(f.properties.indoor)||!f.geometry) continue;
  if(f.geometry.type==='Polygon') r.push(f.geometry.coordinates[0]); else if(f.geometry.type==='MultiPolygon') for(const p of f.geometry.coordinates) r.push(p[0]); } return r; }
function pir(x,y,ring){ let inside=false; for(let i=0,j=ring.length-1;i<ring.length;j=i++){const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1]; if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;} return inside; }
function insideWalk(lng,lat){ if(!WALK.length) return true; for(const r of WALK) if(pir(lng,lat,r)) return true; return false; }
const ringCentroid=r=>{ let sx=0,sy=0; for(const p of r){sx+=p[0];sy+=p[1];} return [sx/r.length,sy/r.length]; };
const ringArea=r=>{ let a=0; for(let i=0,j=r.length-1;i<r.length;j=i++) a+=(r[j][0]+r[i][0])*(r[j][1]-r[i][1]); return Math.abs(a/2); };
/* a point guaranteed inside a (possibly concave) ring: centroid if it lands
   inside, else the first hit of a grid sweep over the bbox */
function interiorPoint(ring){ const c=ringCentroid(ring); if(pir(c[0],c[1],ring)) return c;
  const bb=[180,90,-180,-90]; for(const p of ring){bb[0]=Math.min(bb[0],p[0]);bb[1]=Math.min(bb[1],p[1]);bb[2]=Math.max(bb[2],p[0]);bb[3]=Math.max(bb[3],p[1]);}
  for(let gy=1;gy<12;gy++) for(let gx=1;gx<12;gx++){ const x=bb[0]+(bb[2]-bb[0])*gx/12, y=bb[1]+(bb[3]-bb[1])*gy/12; if(pir(x,y,ring)) return [x,y]; }
  return c; }
/* spawn inside the largest walkable floor polygon (the main hall) */
function spawnInside(fc){ if(!WALK.length) return centroid(fc.features);
  let big=WALK[0],ba=-1; for(const r of WALK){ const a=ringArea(r); if(a>ba){ ba=a; big=r; } }
  return interiorPoint(big); }

/* Group buildings as seen from the sky: each `building` footprint is a group;
   `building:part` pieces are folded into the smallest footprint that contains
   them. GROUP[id] → its footprint id; MEMBERS[footprintId] → all member ids. */
function computeGroups(){
  GROUP={}; MEMBERS={};
  const foot=[];
  BUILDINGS.features.forEach((f,i)=>{ if(f.properties.building && f.geometry){
    const rings=[]; if(f.geometry.type==='Polygon') rings.push(f.geometry.coordinates[0]);
    else if(f.geometry.type==='MultiPolygon') for(const p of f.geometry.coordinates) rings.push(p[0]);
    if(rings.length){ const bb=bboxOf(f.geometry); foot.push({id:i,rings,area:(bb[2]-bb[0])*(bb[3]-bb[1])}); }
  }});
  foot.sort((a,b)=>a.area-b.area);                  // smallest first → most specific
  foot.forEach(ft=>{ GROUP[ft.id]=ft.id; MEMBERS[ft.id]=[ft.id]; });
  BUILDINGS.features.forEach((f,j)=>{
    if(GROUP[j]!=null) return;                       // already a footprint group
    const pt=repPoint(f.geometry); let g=null;
    if(pt) for(const ft of foot){ if(ft.rings.some(r=>pir(pt[0],pt[1],r))){ g=ft.id; break; } }
    if(g!=null){ GROUP[j]=g; MEMBERS[g].push(j); } else { GROUP[j]=j; MEMBERS[j]=[j]; }
  });
}
const setGroupState=(g,key,val)=>{ for(const id of (MEMBERS[g]||[g])) bldgs.setFeatureState({source:'buildings',id},{[key]:val}); };
/* how many distinct indoor levels fall within a building group's footprint */
function indoorLevelsOf(groupId){ const feat=BUILDINGS.features[groupId]; if(!feat||!feat.geometry) return 0;
  const bb=bboxOf(feat.geometry), set=new Set();
  for(const f of INDOOR.features){ if(!f.geometry) continue; const pt=repPoint(f.geometry); if(!inBbox(pt,bb)) continue;
    for(const n of parseLevels(f.properties.level)) if(n>=-6&&n<=4) set.add(n); }
  return set.size; }
const _lvCache={};
const groupHasLevels=g=>{ if(g==null) return false; if(_lvCache[g]===undefined) _lvCache[g]=indoorLevelsOf(g)>0; return _lvCache[g]; };
/* convex hull (monotone chain) → a single "bounding building" for a group */
function convexHull(pts){ if(pts.length<3) return pts.slice();
  const p=pts.slice().sort((a,b)=>a[0]-b[0]||a[1]-b[1]), cross=(o,a,b)=>(a[0]-o[0])*(b[1]-o[1])-(a[1]-o[1])*(b[0]-o[0]);
  const lo=[]; for(const q of p){ while(lo.length>=2&&cross(lo[lo.length-2],lo[lo.length-1],q)<=0) lo.pop(); lo.push(q); }
  const hi=[]; for(let i=p.length-1;i>=0;i--){ const q=p[i]; while(hi.length>=2&&cross(hi[hi.length-2],hi[hi.length-1],q)<=0) hi.pop(); hi.push(q); }
  lo.pop(); hi.pop(); return lo.concat(hi); }
function buildingPoints(groupId){ const pts=[]; let maxH=0;
  for(const id of (MEMBERS[groupId]||[groupId])){ const f=BUILDINGS.features[id]; if(!f||!f.geometry) continue; const p=f.properties;
    const h=p.height?+p.height:(p['building:levels']?+p['building:levels']*3.2:9); if(h>maxH) maxH=h;
    const g=f.geometry, rings=g.type==='Polygon'?g.coordinates:g.type==='MultiPolygon'?[].concat(...g.coordinates):[];
    for(const r of rings) for(const c of r) pts.push(c); }
  return {pts, maxH:maxH||12}; }
// one bounding-building hull (id = group id) for every group that has indoor
// levels — this is the only selectable layer in the buildings view
function selectablesFC(){ const seen=new Set(), out=[];
  for(const k in MEMBERS){ const g=+k; if(seen.has(g)) continue; seen.add(g); if(!groupHasLevels(g)) continue;
    const {pts,maxH}=buildingPoints(g), hull=convexHull(pts); if(hull.length<3) continue; hull.push(hull[0]);
    out.push({type:'Feature',id:g,properties:{group:g,h:maxH},geometry:{type:'Polygon',coordinates:[hull]}}); }
  return {type:'FeatureCollection',features:out}; }

/* OSM `indoor=wall` are zero-width ways and room/shop outlines are thin rings;
   buffer them into solid quads (≈0.5 m thick) so they read as real walls in the
   first-person view instead of disappearing. Returns an array of polygon rings. */
function bufferLine(coords,T){ const polys=[], h=T/2;
  for(let i=0;i+1<coords.length;i++){ const a=coords[i], b=coords[i+1];
    const dxm=(b[0]-a[0])*M_LON, dym=(b[1]-a[1])*M_LAT, len=Math.hypot(dxm,dym)||1;
    const ndx=(-dym/len*h)/M_LON, ndy=(dxm/len*h)/M_LAT;
    polys.push([[[a[0]+ndx,a[1]+ndy],[b[0]+ndx,b[1]+ndy],[b[0]-ndx,b[1]-ndy],[a[0]-ndx,a[1]-ndy],[a[0]+ndx,a[1]+ndy]]]); }
  return polys; }
function wallsFC(features,T){ const out=[];
  for(const f of features){ const ind=f.properties.indoor, g=f.geometry; if(!g) continue; const src=f.properties._id;
    if(ind==='wall'){ const lines=g.type==='LineString'?[g.coordinates]:g.type==='MultiLineString'?g.coordinates:g.type==='Polygon'?g.coordinates:[];
      for(const ln of lines){ const p=bufferLine(ln,T); if(p.length) out.push({type:'Feature',properties:{...f.properties,_src:src,_base:BASE_Z,_top:BASE_Z+WALL_H},geometry:{type:'MultiPolygon',coordinates:p}}); } }
    else if(ind==='column'){ out.push({type:'Feature',properties:{...f.properties,_src:src,_base:BASE_Z,_top:BASE_Z+WALL_H},geometry:g}); }
    else if((ind==='room'||f.properties.shop)&&(g.type==='Polygon'||g.type==='MultiPolygon')){
      const rings=g.type==='Polygon'?g.coordinates:[].concat(...g.coordinates);
      for(const r of rings){ const p=bufferLine(r,T); if(p.length) out.push({type:'Feature',properties:{...f.properties,_src:src,_base:BASE_Z,_top:BASE_Z+WALL_H},geometry:{type:'MultiPolygon',coordinates:p}}); } }
  } return {type:'FeatureCollection',features:out}; }
/* point POIs → small extruded marker pillars for the first-person view */
const POI_H={door:2.2,elevator:2.6,vending_machine:1.8,shop:2.4};
const poiKind=p=>p.highway==='elevator'?'elevator':p.amenity==='vending_machine'?'vending_machine':(p.door&&p.door!=='no')?'door':p.shop?'shop':null;   // door=no means NO door
// h = hovered _src (pale gold), v = selected _src (gold), else by kind
const poiColor=(h,v)=>['case',['==',['get','_src'],['literal',v]],'#ffd23f',['==',['get','_src'],['literal',h]],'#ffe08a',['==',['get','kind'],'elevator'],'#f0b429',['==',['get','kind'],'shop'],'#3fb950',['==',['get','kind'],'door'],'#e8543b','#58a6ff'];
// escalator (conveying) orange, plain stairs tan; hover pale, selected gold
const escColor=(h,v)=>['case',['==',['get','_src'],['literal',v]],'#ffd23f',['==',['get','_src'],['literal',h]],'#ffe08a',['==',['get','part'],'rail'],'#9fd3e0',['==',['get','esc'],1],'#9aa6b8','#caa46a'];
// animated "running" band: escalator steps light up where (_phase - ph) mod 1 is small,
// _phase oriented by travel direction so the band moves up on up-escalators, down on down-escalators
const escColorAnim=(ph,h,v)=>['case',['==',['get','_src'],['literal',v]],'#ffd23f',['==',['get','_src'],['literal',h]],'#ffe08a',['==',['get','part'],'rail'],'#9fd3e0',
  ['all',['==',['get','esc'],1],['==',['get','part'],'step'],['<',['%',['+',['-',['get','_phase'],['literal',ph]],1],1],0.28]],'#fff0b0',
  ['==',['get','esc'],1],'#9aa6b8','#caa46a'];
function poisFC(features){ const out=[], S=0.45, dx=S/M_LON, dy=S/M_LAT;
  for(const f of features){ if(!f.geometry||f.geometry.type!=='Point') continue; const k=poiKind(f.properties); if(!k) continue;
    const [x,y]=f.geometry.coordinates;
    out.push({type:'Feature',properties:{...f.properties,_src:f.properties._id,kind:k,_base:BASE_Z,_top:BASE_Z+(POI_H[k]||2.2)},
      geometry:{type:'Polygon',coordinates:[[[x-dx,y-dy],[x+dx,y-dy],[x+dx,y+dy],[x-dx,y+dy],[x-dx,y-dy]]]}}); }
  return {type:'FeatureCollection',features:out}; }
/* offset a polyline sideways by `off` metres (perpendicular) */
function lineOffset(ln,off){ const out=[];
  for(let i=0;i<ln.length;i++){ const a=ln[Math.max(0,i-1)], b=ln[Math.min(ln.length-1,i+1)];
    const dxm=(b[0]-a[0])*M_LON, dym=(b[1]-a[1])*M_LAT, len=Math.hypot(dxm,dym)||1;
    out.push([ln[i][0]+(-dym/len*off)/M_LON, ln[i][1]+(dxm/len*off)/M_LAT]); }
  return out; }
/* split a polyline into N equal-length sub-segments [a,b] */
function resample(ln,N){ const cum=[0]; let total=0;
  for(let i=0;i+1<ln.length;i++){ total+=Math.hypot((ln[i+1][0]-ln[i][0])*M_LON,(ln[i+1][1]-ln[i][1])*M_LAT); cum.push(total); }
  if(total===0) return [];
  const at=fr=>{ const d=fr*total; for(let i=0;i+1<ln.length;i++){ if(d<=cum[i+1]||i+2===ln.length){ const t=(d-cum[i])/((cum[i+1]-cum[i])||1); return [ln[i][0]+(ln[i+1][0]-ln[i][0])*t, ln[i][1]+(ln[i+1][1]-ln[i][1])*t]; } } return ln[ln.length-1]; };
  const out=[]; for(let i=0;i<N;i++) out.push([at(i/N),at((i+1)/N)]); return out; }
/* escalators & stairs (highway=steps) → a rising staircase (solid stepped
   treads) flanked by two glass-style side rails. `esc`=1 if conveying.
   Each piece carries _src (whole run highlights together) + _base/_top. */
/* nearest mapped level above (d>0) / below (d<0) the active one */
const levelHasFloor=lv=>floorsOf(SEL).some(f=>parseLevels(f.properties.level).includes(lv));   // skip empty mezzanines (e.g. -0.5)
function nextLevel(d){ const c=SEL_LEVELS.filter(l=>(d>0?l>activeLevel:l<activeLevel)&&levelHasFloor(l)); return c.length?(d>0?Math.min(...c):Math.max(...c)):null; }
/* which way does a steps way go, from the level we're on? Prefer its level span

function escDir(p){
  const levs=parseLevels(p.level).filter(n=>n>=-6&&n<=4);
  let goesUp = levs.length>=2 ? (activeLevel < Math.max(...levs)) : (p.incline==='up'?true:p.incline==='down'?false:p.conveying==='backward'?false:true);
  let target = goesUp?nextLevel(1):nextLevel(-1);
  if(target==null) target = goesUp?nextLevel(-1):nextLevel(1);

}
const md=(a,b)=>Math.hypot((a.lng-b.lng)*M_LON,(a.lat-b.lat)*M_LAT);
function distToPolyline(lng,lat,ln){ let m=1e9;
  for(let i=0;i+1<ln.length;i++){ const ax=(ln[i][0]-lng)*M_LON,ay=(ln[i][1]-lat)*M_LAT,bx=(ln[i+1][0]-lng)*M_LON,by=(ln[i+1][1]-lat)*M_LAT,dx=bx-ax,dy=by-ay,L2=dx*dx+dy*dy;

  return m; }
function escalatorsFC(features){ const out=[], W=1.6;
  for(const f of features){ const p=f.properties; if(p.highway!=='steps'||!f.geometry) continue;
    const esc=(p.conveying&&p.conveying!=='no')?1:0, up=escDir(p).up;
    const lines=f.geometry.type==='LineString'?[f.geometry.coordinates]:f.geometry.type==='MultiLineString'?f.geometry.coordinates:[];
    for(const ln of lines){ if(ln.length<2) continue;
      let run=0; for(let i=0;i+1<ln.length;i++) run+=Math.hypot((ln[i+1][0]-ln[i][0])*M_LON,(ln[i+1][1]-ln[i][1])*M_LAT);
      run=run||1; const rise=Math.min(4.5,Math.max(1.5,run*0.5)), N=Math.max(5,Math.min(18,Math.round(run)));
      if(up){
        // UP: a solid rising staircase above the slab, flanked by glass side rails
        resample(ln,N).forEach(([a,b],i)=>{ const q=bufferLine([a,b],W); if(q.length) out.push({type:'Feature',
          properties:{...p,_src:p._id,esc,part:'step',_phase:i/N,_base:BASE_Z+Math.max(0,(i/N)*rise-0.06),_top:BASE_Z+((i+1)/N)*rise},geometry:{type:'MultiPolygon',coordinates:q}}); });
        for(const side of [W/2,-W/2]){ resample(lineOffset(ln,side),N).forEach(([a,b],i)=>{ const q=bufferLine([a,b],0.16); if(q.length) out.push({type:'Feature',
          properties:{...p,_src:p._id,esc,part:'rail',_phase:0,_base:BASE_Z+(i/N)*rise,_top:BASE_Z+((i+1)/N)*rise+0.95},geometry:{type:'MultiPolygon',coordinates:q}}); }); }
      } else {
        // DOWN: descends below the slab into a well (positive z thanks to BASE_Z); the floor is cut open (floorcut)
        resample(ln,N).forEach(([a,b],i)=>{ const q=bufferLine([a,b],W); if(q.length) out.push({type:'Feature',
          properties:{...p,_src:p._id,esc,part:'step',_phase:1-(i/N),_base:BASE_Z-((i+1)/N)*rise,_top:BASE_Z-(i/N)*rise+0.02},geometry:{type:'MultiPolygon',coordinates:q}}); });
        for(const side of [W/2,-W/2]){ resample(lineOffset(ln,side),N).forEach(([a,b],i)=>{ const q=bufferLine([a,b],0.16); if(q.length) out.push({type:'Feature',
          properties:{...p,_src:p._id,esc,part:'rail',_phase:0,_base:BASE_Z-((i+1)/N)*rise,_top:BASE_Z-(i/N)*rise+0.9},geometry:{type:'MultiPolygon',coordinates:q}}); }); }

function footprintRing(ln,W){ const ring=lineOffset(ln,W/2).concat(lineOffset(ln,-W/2).reverse()); ring.push(ring[0]); return ring; }
/* floor polygons with a hole punched where each DOWN escalator descends, so the well is visible */
function floorCutFC(features){ const strips=[];
  for(const f of features){ const p=f.properties; if(p.highway!=='steps'||!f.geometry||!(p.conveying&&p.conveying!=='no')||escDir(p).up) continue;
    const lines=f.geometry.type==='LineString'?[f.geometry.coordinates]:f.geometry.type==='MultiLineString'?f.geometry.coordinates:[];
    for(const ln of lines) if(ln.length>=2){ const ring=footprintRing(ln,1.9); strips.push({ring,c:ringCentroid(ring)}); } }
  const out=[];
  for(const f of features){ if(!FLOORISH.includes(f.properties.indoor)||!f.geometry) continue;
    const isMulti=f.geometry.type==='MultiPolygon', polys=isMulti?f.geometry.coordinates:f.geometry.type==='Polygon'?[f.geometry.coordinates]:null; if(!polys) continue;
    const cut=polys.map(rings=>{ const outer=rings[0]; return [outer,...rings.slice(1),...strips.filter(s=>pir(s.c[0],s.c[1],outer)).map(s=>s.ring)]; });
    out.push({type:'Feature',properties:f.properties,geometry:{type:isMulti?'MultiPolygon':'Polygon',coordinates:isMulti?cut:cut[0]}}); }
  return {type:'FeatureCollection',features:out}; }

/* per-level colour ramp (step → tolerates fractional levels; active = white) */
const STACK_PAL=['#5470c6','#3fb1e3','#37c79a','#6fd45a','#c4e34a','#f6c343','#f0883e','#e8543b','#d6457f','#9a5bd6'];
const palRamp=()=>{ if(SEL_LEVELS.length<2) return STACK_PAL[0]; const e=['step',['get','_lv'],STACK_PAL[0]]; for(let k=1;k<SEL_LEVELS.length;k++) e.push(SEL_LEVELS[k],STACK_PAL[k%STACK_PAL.length]); return e; };
const stackColorExpr=()=>['case',['==',['get','_lv'],['literal',activeLevel]],'#ffffff',palRamp()];
// each level is a solid block filling its storey (contiguous by level index,
// small seam between) so the stack reads as a filled building volume
function buildStack(){ const f=[], idx=new Map(SEL_LEVELS.map((l,i)=>[l,i]));
  for(const x of floorsOf(SEL)) for(const lv of parseLevels(x.properties.level)){
    const i=idx.has(lv)?idx.get(lv):0, base=i*GAP, top=base+GAP*0.88;
    f.push({type:'Feature',properties:{_lv:lv,_base:base,_top:top},geometry:x.geometry}); }
  return {type:'FeatureCollection',features:f}; }

/* describe an indoor component for hover/click info */
const cap=s=>String(s).replace(/_/g,' ');
function describe(p){
  // a human "kind" so we never just say "feature"
  let kind = (p.shop&&('Shop'+(p.shop!=='yes'?' · '+cap(p.shop):'')))
    || (p.amenity&&cap(p.amenity))
    || (p.highway==='elevator'&&'Elevator')
    || (p.highway==='steps'&&(p.conveying&&p.conveying!=='no'?'Escalator':'Stairs'))
    || (p.door&&p.door!=='no'&&('Door'+(p.door!=='yes'?' · '+cap(p.door):'')))
    || (p.entrance&&'Entrance')
    || (p.railway&&cap(p.railway))
    || (p.room&&('Room'+(p.room!=='yes'?' · '+cap(p.room):'')))
    || (p.indoor&&('Indoor '+cap(p.indoor)))
    || 'Feature';
  if(p.highway==='steps'){ const d=escDir(p), conv=p.conveying&&p.conveying!=='no';
    kind=(conv?'Escalator ':'Stairs ')+(d.up?'↑ up':'↓ down')+(d.target!=null?' → level '+d.target:''); }
  const title=p.name||p.ref||kind, sub=(p.name&&kind!==title)?kind:'';
  const seen=new Set(['name','ref','kind','h','_id','_src','_lv']);
  const rows=[], order=['shop','amenity','room','indoor','level','repeat_on','highway','conveying','door','entrance','railway','public_transport','network','operator','brand','opening_hours','wheelchair','width','height'];
  const lbl={repeat_on:'repeat on',public_transport:'transport',opening_hours:'hours'};
  const row=k=>{ if(p[k]!=null&&!seen.has(k)){ seen.add(k); rows.push(`<span style="color:#8b949e">${lbl[k]||k}</span> ${cap(p[k])}`); } };
  for(const k of order) row(k);
  for(const k in p){ if(seen.has(k)||k[0]==='_'||k==='@id') continue; row(k); }   // any remaining OSM tags
  let link=''; if(p['@id']) link=`<br><a href="https://www.openstreetmap.org/${p['@id']}" target="_blank" rel="noopener" style="color:#58a6ff">OSM ${p['@id']}</a>`;
  return `<b>${title}</b>${sub?' <span style="color:#8b949e">· '+sub+'</span>':''}${rows.length?'<br>'+rows.join('<br>'):''}${link}`;
}

/* dynamic URL: #lat,lng,level,heading°[,group] — bookmark/share your exact spot */
function readHash(){ const m=location.hash.replace(/^#/,'').split(','); if(m.length<3) return null;
  const lat=+m[0],lng=+m[1],lv=+m[2],hd=m[3]!=null?+m[3]:0,g=(m[4]!=null&&m[4]!=='')?+m[4]:null;
  if(isNaN(lat)||isNaN(lng)||isNaN(lv)) return null; return {lat,lng,lv,hd,g}; }
function writeHash(){ try{ history.replaceState(null,'',`#${player.lat.toFixed(6)},${player.lng.toFixed(6)},${activeLevel},${Math.round(player.heading*180/Math.PI)}${selGroup!=null?','+selGroup:''}`); }catch(_){ } }
const setInfo=h=>document.getElementById('info').innerHTML=h;
const stackInfo=()=>document.getElementById('stackinfo').innerHTML = SEL_LEVELS.length?`<b>${selName}</b><br>level <b>${activeLevel}</b> · ${SEL_LEVELS.length} levels`:`<b>${selName}</b><br><i>no indoor levels</i>`;
function buildingInfo(p,mode){ const m=[]; if(p['building:levels']) m.push(p['building:levels']+' levels'); if(p.height) m.push(p.height+' m'); if(p.building&&p.building!=='yes') m.push(p.building);
  const hint = mode==='hover' ? '<i>click to select</i>' : mode==='none' ? '<i style="color:#8b949e">no indoor levels mapped</i>' : '↗ pick a level (middle)';
  return `<b>${p.name||p.building||'building'}</b>${m.length?'<br>'+m.join(' · '):''}<br>${hint}`; }

function selectBuilding(groupId){
  if(selGroup!=null) bldgs.setFeatureState({source:'selectable',id:selGroup},{sel:false});
  selGroup=(groupId==null?null:groupId);
  if(selGroup!=null) bldgs.setFeatureState({source:'selectable',id:selGroup},{sel:true});   // gold bounding building
  const feat=(selGroup!=null)?BUILDINGS.features[selGroup]:null;
  SEL = feat ? INDOOR.features.filter(f=>inBbox(repPoint(f.geometry),bboxOf(feat.geometry))) : INDOOR.features;
  const set=new Set(); for(const f of SEL) for(const n of parseLevels(f.properties.level)) set.add(n);
  SEL_LEVELS=[...set].filter(n=>n>=-6&&n<=4).sort((a,b)=>a-b);
  const p=feat?feat.properties:{name:'Gare de Lyon (whole station)'};
  selName=p.name||p.building||'building';
  if(SEL_LEVELS.length){
    minLv=Math.min(...SEL_LEVELS); activeLevel=SEL_LEVELS.includes(0)?0:SEL_LEVELS[0];
    stk.getSource('stack').setData(buildStack());
    stk.setPaintProperty('stack','fill-extrusion-base',['get','_base']);
    stk.setPaintProperty('stack','fill-extrusion-height',['get','_top']);
    const shellFeats = selGroup!=null ? (MEMBERS[selGroup]||[selGroup]).map(id=>BUILDINGS.features[id]).filter(f=>f&&f.geometry) : [];
    stk.getSource('shellbase').setData({type:'FeatureCollection',features:shellFeats});
    const fitFeats = floorsOf(SEL).length?floorsOf(SEL):(shellFeats.length?shellFeats:SEL);
    const sf=fitView(fitFeats,stk,0.82,true); stk.jumpTo({center:sf.center,zoom:sf.zoom,pitch:46,bearing:-17});
    focusLevel(activeLevel);
    selInfo=buildingInfo(p,'sel')+`<br>${SEL_LEVELS.length} indoor levels`;
  } else {
    stk.getSource('stack').setData({type:'FeatureCollection',features:[]});
    stk.getSource('shellbase').setData({type:'FeatureCollection',features:[]});
    plan.getSource('level').setData({type:'FeatureCollection',features:[]});
    fps.getSource('indoor').setData({type:'FeatureCollection',features:[]});
    fps.getSource('walls3d').setData({type:'FeatureCollection',features:[]});
    WALK=[]; selInfo=`<b>${selName}</b><br><i>no indoor levels mapped</i>`; stackInfo();
  }
  setInfo(selInfo);
}
function focusLevel(lv,keepPos){
  if(!SEL_LEVELS.includes(lv)) return;
  activeLevel=lv;
  const fc=levelFC(lv);
  fps.getSource('indoor').setData(fc);
  fps.getSource('floorcut').setData(floorCutFC(fc.features));
  fps.getSource('walls3d').setData(wallsFC(fc.features,0.5));
  fps.getSource('pois3d').setData(poisFC(fc.features));
  fps.getSource('esc3d').setData(escalatorsFC(fc.features));
  plan.getSource('level').setData(fc);
  WALK=walkRings(fc.features);
  // escalator ride-zones for this level (conveying steps only)
  ESC=fc.features.filter(f=>f.properties.highway==='steps'&&f.geometry).flatMap(f=>{
    const ls=f.geometry.type==='LineString'?[f.geometry.coordinates]:f.geometry.type==='MultiLineString'?f.geometry.coordinates:[];
    return ls.filter(l=>l.length>=2).map(ln=>({ln,p:f.properties,esc:(f.properties.conveying&&f.properties.conveying!=='no')?1:0})); });
  ride=null; rideCool=0.5;
  planZoom=planFollowZoom(); planZoomAdj=0;
  if(!keepPos){ const sp=spawnInside(fc); player.lng=sp[0]; player.lat=sp[1]; }
  player.z=0;
  stk.setPaintProperty('stack','fill-extrusion-color',stackColorExpr());
  PICK=null; HOVER=null; repaint();
  stackInfo(); hud();
}
/* place the player on the new level's floor near the escalator landing */
function landAt(fromPt,toPt){ const ux=toPt.lng-fromPt.lng, uy=toPt.lat-fromPt.lat, L=Math.hypot(ux*M_LON,uy*M_LAT)||1;
  let lng=toPt.lng+2*ux/L, lat=toPt.lat+2*uy/L;
  if(!insideWalk(lng,lat)){ lng=toPt.lng; lat=toPt.lat; }
  if(!insideWalk(lng,lat)) for(let r=1;r<=8;r++){ let hit=false; for(let a=0;a<8;a++){ const ang=a*Math.PI/4, nx=toPt.lng+Math.cos(ang)*r/M_LON, ny=toPt.lat+Math.sin(ang)*r/M_LAT; if(insideWalk(nx,ny)){ lng=nx; lat=ny; hit=true; break; } } if(hit) break; }
  if(!insideWalk(lng,lat)){ const sp=spawnInside(levelFC(activeLevel)); lng=sp[0]; lat=sp[1]; }
  player.lng=lng; player.lat=lat; }
/* board an escalator: ride down quickly, ride up over its full length */
/* the entrance end of an escalator (where the conveyor starts) — you can only
   board from this end, not from the side or the exit */
function boardPoint(z){ const ln=z.ln, a={lng:ln[0][0],lat:ln[0][1]}, b={lng:ln[ln.length-1][0],lat:ln[ln.length-1][1]}, c=z.p.conveying;
  if(c==='backward') return b; if(c==='forward') return a; return md(player,a)<=md(player,b)?a:b; }   // 'yes'/unknown → nearest end
function startRide(z,board){ const {up,target}=escDir(z.p); if(target==null) return;
  const a={lng:z.ln[0][0],lat:z.ln[0][1]}, b={lng:z.ln[z.ln.length-1][0],lat:z.ln[z.ln.length-1][1]};
  const far=md(board,a)<md(board,b)?b:a;   // ride from the entrance to the opposite end
  turnTo=null; const run=md(board,far);
  // both directions ride at rolling-escalator pace; up traverses the whole run
  // before switching at the top, down switches quickly after a short descent
  ride={from:board,to:far,target,up,t:0,dur: up ? Math.max(2.5,Math.min(7,run/ESC_SPEED)) : 1.0};
}
function advanceRide(dt){ ride.t+=dt/ride.dur; const t=Math.min(1,ride.t);
  player.lng=ride.from.lng+(ride.to.lng-ride.from.lng)*t; player.lat=ride.from.lat+(ride.to.lat-ride.from.lat)*t;
  player.z=(ride.up?1:-1)*GAP*t;
  player.heading=Math.atan2((ride.to.lat-ride.from.lat)*M_LAT,(ride.to.lng-ride.from.lng)*M_LON);
  if(ride.t>=1){ const tgt=ride.target, fromPt=ride.from, toPt=ride.to; ride=null; rideCool=1.6; focusLevel(tgt,true); landAt(fromPt,toPt); } }
/* Paint hover (pale gold) + selection (solid gold) across the FPS and plan views.
   The two are independent — hover (cross passing over) NEVER changes the selection
   (PICK). Floor is never recoloured. `pickV` overrides PICK (used by the flash). */
function paintState(pickV){
  const v=(pickV===undefined?(PICK==null?-1:PICK):pickV), h=(HOVER==null?-2:HOVER);
  fps.setPaintProperty('walls','fill-extrusion-color',['case',['==',['get','_src'],['literal',v]],'#ffd23f',['==',['get','_src'],['literal',h]],'#ffe08a','#9aa6b8']);
  fps.setPaintProperty('pois3d','fill-extrusion-color',poiColor(h,v));
  fps.setPaintProperty('esc-3d','fill-extrusion-color',escColor(h,v));
  plan.setPaintProperty('p-area','fill-color',['case',['==',['get','_id'],['literal',v]],'#ffd23f',['==',['get','_id'],['literal',h]],'#ffe08a',['has','shop'],'#2e6f4e','#34507a']);
  plan.setPaintProperty('p-area-line','line-color',['case',['==',['get','_id'],['literal',v]],'#ffd23f',['==',['get','_id'],['literal',h]],'#ffe08a',['has','shop'],'#3fb950','#58a6ff']);
  plan.setPaintProperty('p-wall-line','line-color',['case',['==',['get','_id'],['literal',v]],'#ffd23f',['==',['get','_id'],['literal',h]],'#ffe08a','#8893a5']);
  plan.setPaintProperty('p-walls','fill-color',['case',['==',['get','_id'],['literal',v]],'#ffd23f',['==',['get','_id'],['literal',h]],'#ffe08a','#9aa6b8']);
  plan.setPaintProperty('p-stairs','line-color',['case',['==',['get','_id'],['literal',v]],'#ffd23f',['==',['get','_id'],['literal',h]],'#ffe08a',['all',['has','conveying'],['!=',['get','conveying'],'no']],'#f0883e','#caa46a']);
  plan.setPaintProperty('p-poi','circle-stroke-color',['case',['==',['get','_id'],['literal',v]],'#ffd23f',['==',['get','_id'],['literal',h]],'#ffe08a','#0d1117']);
  plan.setPaintProperty('p-poi','circle-stroke-width',['case',['==',['get','_id'],['literal',v]],3,['==',['get','_id'],['literal',h]],2.2,1.5]);
}
function repaint(){ paintState(); showSel(); }
/* fixed panel showing the SELECTED element's info (persists until selection
   changes); hover info (#look / #planinfo) is separate and transient */
function showSel(){ const el=document.getElementById('selinfo'); const f=(PICK!=null&&INDOOR.features[PICK])?INDOOR.features[PICK]:null;
  if(f){ el.style.display='block'; el.innerHTML='📌 '+describe(f.properties); } else el.style.display='none'; }
/* brief flash of the just-selected component (gold ↔ its colour), then solid */
let flashN=0, flashAcc=0, flashOn=true;
function startFlash(){ if(PICK!=null){ flashN=6; flashAcc=0; flashOn=true; } }
/* plan = a ~30 m-radius follow-cam centred on the player (heading-up) */
const PLAN_RADIUS_M=30;
function planFollowZoom(){ const cv=plan.getCanvas(), px=Math.min(cv.clientWidth||300,cv.clientHeight||300); return Math.log2(EARTH*COSLAT*px/(512*2*PLAN_RADIUS_M)); }
function hud(){ document.getElementById('hud').innerHTML=`<b>Gare de Lyon</b> · level <b>${activeLevel}</b><br>WASD / arrows move · mouse looks · <b>space</b> selects · click FPS to capture`; }

/* mobile stepped views (no-op on desktop) */
function setStep(s){
  if(!MOBILE) return; step=s;
  for(const id of ['buildings','stack','fps','plan']){ const el=document.getElementById(id); el.classList.remove('show','inset'); }
  if(s==='buildings') document.getElementById('buildings').classList.add('show');
  else if(s==='stack') document.getElementById('stack').classList.add('show');
  else { document.getElementById('fps').classList.add('show'); document.getElementById('plan').classList.add('show','inset'); }
  const vis=(id,on)=>{const el=document.getElementById(id); el.style.display=on?'':'none';};
  vis('info',s==='buildings'); vis('stackinfo',s==='stack'); vis('cross',s==='fps'); vis('hud',s==='fps'); vis('look',false);
  const back=document.getElementById('back'); back.style.display=s==='buildings'?'none':'block'; back.textContent=s==='fps'?'‹ levels':'‹ buildings';
  setTimeout(()=>({buildings:[bldgs],stack:[stk],fps:[fps,plan]}[s]).forEach(m=>m.resize()),30);
}
document.getElementById('back').onclick=()=>{ if(step==='fps') setStep('stack'); else if(step==='stack') setStep('buildings'); };
// manual plan zoom (the views auto-follow the player, so a dedicated control
// avoids fighting that auto-fit). Adjusts an offset on top of the follow zoom.
document.getElementById('pz-in').onclick =()=>{ planZoomAdj=Math.min(4,planZoomAdj+0.6); };
document.getElementById('pz-out').onclick=()=>{ planZoomAdj=Math.max(-3,planZoomAdj-0.6); };

/* input */
const keys={};
addEventListener('keydown',e=>{ keys[e.code]=true; if(e.code.startsWith('Arrow')||e.code==='Space') e.preventDefault();
  if(e.code==='Space' && (!MOBILE||step==='fps')) selectUnderCross(); });
addEventListener('keyup',e=>keys[e.code]=false);
addEventListener('mousemove',e=>{ if(document.pointerLockElement){ player.heading-=e.movementX*0.0024; player.pitch=Math.max(85,Math.min(95,player.pitch-e.movementY*0.06)); turnTo=null; } });
// re-evaluate mobile on resize so shrinking the desktop window switches into the
// stepped single-view layout (and back), then resize every map.
addEventListener('resize',()=>{
  const m=isMobile();
  if(m!==MOBILE){ MOBILE=m; document.body.classList.toggle('mobile',MOBILE);
    if(MOBILE) setStep(step);
    else { for(const id of ['buildings','stack','fps','plan']){ const el=document.getElementById(id); el.classList.remove('show','inset'); }
      ['info','stackinfo','cross','hud'].forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display=''; });
      document.getElementById('back').style.display='none'; }
  }
  [fps,bldgs,stk,plan].forEach(mp=>mp&&mp.resize());
  planZoom=planFollowZoom();
});

/* movement, confined to the walkable area (slide along walls) */
function move(stepM){
  if(!stepM) return;
  const dx=Math.cos(player.heading)*stepM, dy=Math.sin(player.heading)*stepM;
  tryMove(dx,dy);
}
function tryMove(dx,dy){
  const nlng=player.lng+dx/M_LON, nlat=player.lat+dy/M_LAT;
  if(insideWalk(nlng,nlat)){ player.lng=nlng; player.lat=nlat; }
  else if(insideWalk(player.lng+dx/M_LON,player.lat)) player.lng+=dx/M_LON;
  else if(insideWalk(player.lng,player.lat+dy/M_LAT)) player.lat+=dy/M_LAT;
}
/* smoothly rotate the player to face a clicked plan target — no translation.
   Eased, duration scales with the turn angle, capped at ~2 s. */
function faceTarget(lng,lat){
  const dxm=(lng-player.lng)*M_LON, dym=(lat-player.lat)*M_LAT;
  if(!dxm&&!dym) return;
  const dh=((Math.atan2(dym,dxm)-player.heading+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI)-Math.PI;  // → [-π,π]
  turnTo={from:player.heading, delta:dh, dur:Math.min(2,Math.max(0.4,Math.abs(dh)/Math.PI*2)), el:0};
}

/* FPS eye (camera math verified mercator-correct) */
const EYE_H=1.6, ZOOM_FPS=21, MOVE=2.8, TURN=2.4, ESC_SPEED=0.9;   // MOVE ≈ 10 km/h; ESC_SPEED ≈ rolling-escalator pace (m/s)
function fpsCamera(){
  const H=fps.getCanvas().clientHeight||500;
  const mpp=EARTH*COSLAT/(512*Math.pow(2,ZOOM_FPS));
  const focalPx=(fps.transform&&fps.transform.cameraToCenterDistance)||1.5*H;
  const dWorld=focalPx*mpp, pr=player.pitch*Math.PI/180;
  // keep the eye at the player @ EYE_H and tilt the look-at point up/down with pitch
  const horiz=dWorld*Math.sin(pr);
  const cx=player.lng+Math.cos(player.heading)*horiz/M_LON, cy=player.lat+Math.sin(player.heading)*horiz/M_LAT;
  fps.jumpTo({center:[cx,cy],zoom:ZOOM_FPS,bearing:compass(),pitch:player.pitch,elevation:BASE_Z+EYE_H+(player.z||0)-dWorld*Math.cos(pr)});
}
/* highlight + describe the component under the crosshair */
/* the 3D component (POI marker preferred, then wall) under the crosshair —
   a small box around centre so thin studs are easy to hit; floor is ignored */
function crossComponent(){
  const cx=fps.getCanvas().clientWidth/2, cy=fps.getCanvas().clientHeight/2, R=9;
  let fs=[]; try{ fs=fps.queryRenderedFeatures([[cx-R,cy-R],[cx+R,cy+R]],{layers:['walls','pois3d','esc-3d']}); }catch(_){}
  return fs.find(f=>f.source==='pois3d') || fs.find(f=>f.source==='esc3d') || fs.find(f=>f.properties&&f.properties._src!=null) || null;
}
/* HOVER: the cross passing over a component → pale highlight + info only.
   Never changes the selection (PICK), so a hover can't remove a selection. */
function lookAt(){
  const top=crossComponent();
  const id=top?top.properties._src:null;
  if(id!==HOVER){ HOVER=id; if(flashN===0) paintState(); }   // don't fight an in-progress flash
  const look=document.getElementById('look');
  if(top){ look.style.display='block'; look.innerHTML=describe(top.properties); }
  else look.style.display='none';
}
/* Space / click: lock-SELECT the component under the crosshair (never the floor) */
function selectUnderCross(){
  const top=crossComponent(); if(!top||top.properties._src==null) return;
  PICK=top.properties._src; repaint(); startFlash();
}

let last=0, fc=0;
function frame(t){
  const dt=last?Math.min(0.05,(t-last)/1000):0; last=t;
  if(rideCool>0) rideCool-=dt;
  if(flashN>0){ flashAcc+=dt; if(flashAcc>=0.1){ flashAcc=0; flashOn=!flashOn; paintState(flashOn?(PICK==null?-1:PICK):-1); if(--flashN<=0) repaint(); } }
  const activeFps = !MOBILE || step==='fps';
  if(activeFps){
    if(ride){ advanceRide(dt); }
    else {
      if(keys.ArrowLeft) player.heading+=TURN*dt; if(keys.ArrowRight) player.heading-=TURN*dt;
      const s=MOVE*dt, ch=Math.cos(player.heading), sh=Math.sin(player.heading); let dx=0,dy=0;
      if(keys.KeyW||keys.ArrowUp){dx+=ch*s;dy+=sh*s;} if(keys.KeyS||keys.ArrowDown){dx-=ch*s;dy-=sh*s;}
      if(keys.KeyA){dx+=-sh*s;dy+=ch*s;} if(keys.KeyD){dx+=sh*s;dy+=-ch*s;}
      if(dx||dy||keys.ArrowLeft||keys.ArrowRight) turnTo=null;   // manual input cancels the auto-turn
      if(dx||dy) tryMove(dx,dy);
      else if(turnTo){ turnTo.el+=dt; const u=Math.min(1,turnTo.el/turnTo.dur), e=u<.5?2*u*u:1-Math.pow(-2*u+2,2)/2;
        player.heading=turnTo.from+turnTo.delta*e; if(u>=1) turnTo=null; }
      if(rideCool<=0) for(const z of ESC){ if(!z.esc) continue; const bp=boardPoint(z); if(bp&&md(player,bp)<2.6){ startRide(z,bp); break; } }   // board only from the entrance end
    }
    fpsCamera();
    plan.jumpTo({center:[player.lng,player.lat],zoom:planZoom+planZoomAdj,bearing:compass(),pitch:0});
    if(mePlan){ mePlan.setLngLat([player.lng,player.lat]); mePlan.setRotation(0); }
    if((fc%2)===0) lookAt();   // hover detection — responsive
    if((fc%30)===0) writeHash();   // keep the URL in sync with position/level
    fc++;
  }
  requestAnimationFrame(frame);
}
</script>
</body>
