name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs of this workflow.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          # Landing page + Jekyll opt-out
          cp index.html _site/index.html
          touch _site/.nojekyll
          # Each demo lives in its own top-level folder and is served at /<folder>.
          # Add new demos here (or just drop a folder and copy it).
          for demo in w3d; do
            if [ -d "$demo" ]; then
              mkdir -p "_site/$demo"
              cp -r "$demo"/. "_site/$demo/"
            fi
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
